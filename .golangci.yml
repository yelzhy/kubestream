version: "2"
run:
  allow-parallel-runners: true
linters:
  default: none
  enable:
    - copyloopvar
    - depguard
    - dupl
    - errcheck
    - ginkgolinter
    - goconst
    - gocyclo
    - govet
    - ineffassign
    - lll
    - modernize
    - misspell
    - nakedret
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    - logcheck
  settings:
    depguard:
      rules:
        # Task 0.5 acceptance criterion: internal/controller must depend on the
        # generic sink contract (internal/sink), never on the ClickHouse driver
        # directly. This rule fails the build if that dependency ever creeps
        # back in — in source or test files under internal/controller.
        controller-no-clickhouse:
          files:
            - "**/internal/controller/**"
          deny:
            - pkg: github.com/ClickHouse/clickhouse-go/v2
              desc: "internal/controller must depend on internal/sink, not the ClickHouse driver (Task 0.5)"
    custom:
      logcheck:
        type: "module"
        description: Checks Go logging calls for Kubernetes logging conventions.
    revive:
      rules:
        - name: comment-spacings
        - name: import-shadowing
    modernize:
      disable:
        - omitzero
  exclusions:
    generated: lax
    rules:
      - linters:
          - lll
        path: api/*
      - linters:
          - dupl
          - lll
        path: internal/*
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
